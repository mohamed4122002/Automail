name: "marketing-automation"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_healthy
    environment:
      MONGODB_URL: "mongodb://questioner_mongodb:27017/marketing_db"
      REDIS_URL: "redis://redis:6379/0"
      RUN_MIGRATIONS: "0"
      RUN_SEED: "1"
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    networks:
      - default
      - shared_mongo_net
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A backend.celery_app worker --loglevel=info --pool=prefork --concurrency=10
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      MONGODB_URL: "mongodb://questioner_mongodb:27017/marketing_db"
      REDIS_URL: "redis://redis:6379/0"
      RUN_MIGRATIONS: "0"
      RUN_SEED: "0"
    env_file:
      - .env
    volumes:
      - .:/app
    networks:
      - default
      - shared_mongo_net
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A backend.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      MONGODB_URL: "mongodb://questioner_mongodb:27017/marketing_db"
      REDIS_URL: "redis://redis:6379/0"
      RUN_MIGRATIONS: "0"
      RUN_SEED: "0"
    env_file:
      - .env
    volumes:
      - .:/app
    networks:
      - default
      - shared_mongo_net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://backend:8000
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    driver: bridge
  shared_mongo_net:
    external: true

volumes:
  redis_data:
