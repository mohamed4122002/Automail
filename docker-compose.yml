name: "marketing-automation"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: automation_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Mm01151800275} # Default only for first run if not set
      POSTGRES_DB: marketing_automation
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U automation_user -d marketing_automation" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Use internal service names (db, redis) inside Docker
      DATABASE_URL: "postgresql://automation_user:${POSTGRES_PASSWORD}@db:5432/marketing_automation"
      REDIS_URL: "redis://redis:6379/0"
      RUN_MIGRATIONS: "1"
      RUN_SEED: "1"
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A backend.celery_app worker --loglevel=info --pool=prefork --concurrency=10
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql://automation_user:${POSTGRES_PASSWORD}@db:5432/marketing_automation"
      REDIS_URL: "redis://redis:6379/0"
      RUN_MIGRATIONS: "0"
      RUN_SEED: "0"
    env_file:
      - .env
    volumes:
      - .:/app
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A backend.celery_app beat --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql://automation_user:${POSTGRES_PASSWORD}@db:5432/marketing_automation"
      REDIS_URL: "redis://redis:6379/0"
      RUN_MIGRATIONS: "0"
      RUN_SEED: "0"
    env_file:
      - .env
    volumes:
      - .:/app
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://backend:8000
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
