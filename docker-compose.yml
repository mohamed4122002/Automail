name: "marketing-automation"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform_net
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    ports:
      - "27018:27017"
    volumes:
      - questioner_mongodb_data:/data/db
    command: [ "--replSet", "rs0", "--bind_ip_all" ]
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try {
            let status = rs.status();
            if (status.ok) {
              let cfg = rs.conf();
              if (cfg.members[0].host !== 'mongodb:27017') {
                cfg.members[0].host = 'mongodb:27017';
                rs.reconfig(cfg, {force: true});
              }
              quit(0);
            }
          } catch (e) {
            rs.initiate({
              _id: 'rs0',
              members: [{ _id: 0, host: 'mongodb:27017' }]
            });
            quit(0);
          }
        "
      interval: 10s
      timeout: 10s
      retries: 20
    networks:
      - platform_net
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URL: "mongodb://mongodb:27017/marketing_db?replicaSet=rs0"
      REDIS_URL: "redis://redis:6379/0"
      RUN_SEED: "1"
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    networks:
      - platform_net
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A backend.celery_app worker --loglevel=info --pool=prefork --concurrency=10
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      MONGODB_URL: "mongodb://mongodb:27017/marketing_db?replicaSet=rs0"
      REDIS_URL: "redis://redis:6379/0"
      RUN_SEED: "0"
    env_file:
      - .env
    volumes:
      - .:/app
    networks:
      - platform_net
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A backend.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      MONGODB_URL: "mongodb://mongodb:27017/marketing_db?replicaSet=rs0"
      REDIS_URL: "redis://redis:6379/0"
      RUN_SEED: "0"
    env_file:
      - .env
    volumes:
      - .:/app
    networks:
      - platform_net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://backend:8000
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    depends_on:
      - backend
    networks:
      - platform_net
    restart: unless-stopped

networks:
  platform_net:
    driver: bridge

volumes:
  redis_data:
  questioner_mongodb_data:
    external: true
